name: clerk_sdk
sdkPath: .fvm/flutter_sdk

packages:
  - packages/**
  - packages/clerk_flutter/example

ide:
  intellij:
    enabled: true
    moduleNamePrefix: ''

scripts:
  # Clean all packages
  clean:
    name: Clean all
    description: Run flutter clean in all packages
    run: melos exec -- flutter clean

  # Pub get all packages
  get:
    name: Get all
    description: Run pub get in all packages
    run: melos exec -o -- flutter pub get

  # Pub upgrade all packages
  upgrade:
    name: Upgrade all
    description: Run pub upgrade in all packages
    run: melos exec -o -- flutter pub upgrade

  # Build runner (code generation)
  brunner:
    run: melos exec -o -- dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      scope: "clerk_auth"

  # Format code
  format:
    run: melos exec -- dart format --line-length=80 MELOS_PACKAGE_PATH

  # Analyze code
  analyze:
    run: melos exec -- dart analyze MELOS_PACKAGE_PATH

  # Run build and format code
  brunner_format:
    run: melos run brunner && melos run format

  # Run localizations
  localization:
    run: melos run sort_localizations && melos exec -- flutter gen-l10n && melos run format
    packageFilters:
      scope: "clerk_flutter"

  # Sort localizations `dart pub global activate arb_utils`
  sort_localizations:
    run: melos exec -- arb_utils sort l10n/en.arb
    packageFilters:
      scope: "clerk_flutter"

  # Run tests
  test:
    name: Test all
    description: Run tests in all packages
    run: melos exec -- dart test
    packageFilters:
      dirExists: test

  # Run tests for Flutter packages
  test:flutter:
    name: Test Flutter packages
    description: Run flutter test in Flutter packages (excludes integration tests)
    run: melos exec -- flutter test test/
    packageFilters:
      scope: "clerk_flutter"

  # Run integration tests for clerk_flutter
  test:integration:
    name: Integration tests
    description: Run flutter integration tests (requires a running emulator or device)
    run: melos exec -- flutter test integration_test
    packageFilters:
      scope: "clerk_flutter_example"

  # Run tests for Dart packages
  test:dart:
    name: Test Dart packages
    description: Run dart test in Dart packages
    run: melos exec -- dart test
    packageFilters:
      scope:
        - "clerk_auth"
        - "clerk_backend_api"

  # Coverage - Run tests with coverage for all packages
  coverage:
    name: Coverage all
    description: Run tests with coverage in all packages and generate lcov reports
    run: |
      melos run coverage:dart
      melos run coverage:flutter

  # Coverage for Dart packages (clerk_auth, clerk_backend_api)
  coverage:dart:
    name: Coverage Dart packages
    description: Run tests with coverage for Dart packages
    run: melos exec -- dart run coverage:test_with_coverage
    packageFilters:
      scope:
        - "clerk_auth"
        - "clerk_backend_api"

  # Coverage for Flutter packages (clerk_flutter)
  coverage:flutter:
    name: Coverage Flutter packages
    description: Run tests with coverage for Flutter packages
    run: melos exec -- flutter test --coverage
    packageFilters:
      scope: "clerk_flutter"

  # Coverage for integration tests (requires a running emulator or device)
  coverage:clerk_flutter_example:
    name: Coverage integration tests
    description: Run integration tests with coverage for clerk_flutter_example (requires a running emulator or device)
    run: melos exec -- flutter test integration_test --coverage --coverage-package clerk_flutter
    packageFilters:
      scope: "clerk_flutter_example"

  # Generate HTML coverage reports for each package (requires genhtml/lcov)
  coverage:html:
    name: Generate HTML coverage reports
    description: Generate HTML coverage report for each package from its lcov.info
    run: melos exec -- genhtml coverage/lcov.info -o coverage/html
    packageFilters:
      dirExists: coverage

  coverage:html:clerk_flutter_example:
    name: Generate HTML coverage report for clerk_flutter
    run: melos exec -- genhtml coverage/lcov.info -o coverage/html
    packageFilters:
      scope: "clerk_flutter_example"
      dirExists: coverage

  # Use the below command to globally activate combine_coverage as there is a bug which stops it
  # working correctly on v1.0.2
  # dart pub global activate --source git https://github.com/MarkOSullivan94/combine_coverage.git --git-ref 2029597be45aebed243fb8e02000dafc20969b27
  coverage:combine:
    name: Generate a single LCOV.info test coverage file from all the packages coverage results
    run: dart pub global run combine_coverage --repo-path="$MELOS_ROOT_PATH"

  coverage:genhtml:
    name: Generate HTML for the code coverage
    run: genhtml coverage/lcov.info -o coverage/html --prefix "$MELOS_ROOT_PATH/packages" --hierarchical
