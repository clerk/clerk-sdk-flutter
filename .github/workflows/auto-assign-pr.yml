name: Auto assign PRs

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR and request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Always assign the PR to MarkOSullivan94
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pr.number,
              assignees: ['MarkOSullivan94']
            });

            // Request all maintainers to review unless one of them is the author
            const reviewers = ['slightfoot', 'MarkOSullivan94']
              .filter(reviewer => reviewer !== pr.user.login);

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number: pr.number,
              reviewers
            });
